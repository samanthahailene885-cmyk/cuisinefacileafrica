
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#8B1D1D">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>CuisineFacile - Votre Box Culinaire Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#8B1D1D', // Nouveau Bordeaux Signature
              secondary: '#A52A2A', // Variante bordeaux plus claire
              accent: '#F2994A', // Orange CTA
              beige: '#FAF7F2', // Fond principal
              dark: '#2B2B2B', // Texte
            },
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
            },
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #FAF7F2;
        color: #2B2B2B;
        font-family: 'Outfit', sans-serif;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #FAF7F2;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #8B1D1D;
        border-radius: 10px;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>
<script type="module" src="/src/index.tsx"></script>
</body>
</html>
